# =============================================================================
# Kubernetes Deployment 配置文件 - Nginx Web服务器
# =============================================================================
# 这个文件定义了一个Nginx应用的部署配置
# 功能：创建2个Nginx Pod副本，提供Web服务
# 用途：学习K8s Deployment的基本用法

# API版本说明：
# - apps/v1 是Deployment资源的稳定版本
# - 不同资源类型有不同的API版本
apiVersion: apps/v1

# 资源类型：Deployment
# Deployment用于管理无状态应用的Pod副本
# 它确保指定数量的Pod始终运行，并支持滚动更新
kind: Deployment

# 元数据：定义Deployment的基本信息
metadata:
  # Deployment的名称，在集群内必须唯一
  # 命名规范：小写字母、数字、连字符，不能以数字开头
  name: nginx-deploy
  
  # 标签：用于标识和选择资源
  # 可以添加多个标签，用于资源分类和选择
  labels:
    app: nginx                    # 应用类型标签
    environment: development       # 环境标签
    version: "1.0"               # 版本标签

# Deployment的规格定义
spec:
  # 副本数量：期望运行的Pod数量
  # K8s会自动维护这个数量的Pod运行
  replicas: 2
  
  # 选择器：指定这个Deployment管理哪些Pod
  # 必须与template.metadata.labels匹配
  selector:
    # matchLabels：标签选择器
    # Deployment会管理所有带有这些标签的Pod
    matchLabels:
      app: nginx                  # 选择带有app=nginx标签的Pod
  
  # Pod模板：定义Pod的具体配置
  # Deployment会根据这个模板创建Pod
  template:
    # Pod的元数据
    metadata:
      # Pod的标签，必须匹配selector.matchLabels
      # 这些标签会应用到这个Deployment创建的所有Pod
      labels:
        app: nginx                # 必须与selector.matchLabels一致
        component: frontend      # 组件标签
      
      # 注解：用于存储额外的元数据
      # 不会用于选择资源，但可以提供额外信息
      annotations:
        description: "Nginx web server for learning K8s"
        createdBy: "kubernetes-tutorial"
    
    # Pod的规格定义
    spec:
      # 容器列表：一个Pod可以包含多个容器
      containers:
      # 第一个容器配置（主容器）
      - name: nginx                 # 容器名称，在Pod内必须唯一
        
        # 容器镜像：格式为 image:tag
        # nginx:1.23 表示使用Nginx官方镜像的1.23版本
        image: nginx:1.23
        
        # 镜像拉取策略
        # - IfNotPresent: 如果本地没有则拉取（默认）
        # - Always: 总是拉取最新版本
        # - Never: 只使用本地镜像
        imagePullPolicy: IfNotPresent
        
        # 容器端口配置
        ports:
        - containerPort: 80         # 容器监听的端口
          name: http                 # 端口名称，可选但推荐
          protocol: TCP              # 协议类型（TCP/UDP）
        
        # 资源限制：确保容器不会过度使用资源
        resources:
          # 资源请求：Pod调度时需要的最低资源
          # K8s只会将Pod调度到有足够资源的节点上
          requests:
            cpu: 100m                # CPU请求：100毫核（0.1核）
            memory: 128Mi            # 内存请求：128MB
          
          # 资源限制：容器可以使用的最大资源
          # 超过限制会被K8s限制或终止
          limits:
            cpu: 500m                # CPU限制：500毫核（0.5核）
            memory: 512Mi            # 内存限制：512MB
        
        # 健康检查：就绪探针
        # 用于判断容器是否准备好接收流量
        readinessProbe:
          httpGet:                   # HTTP GET请求检查
            path: /                   # 检查的路径
            port: 80                  # 检查的端口
          initialDelaySeconds: 5      # 容器启动后等待5秒开始检查
          periodSeconds: 10           # 每10秒检查一次
          timeoutSeconds: 5           # 请求超时时间
          successThreshold: 1         # 连续成功1次认为就绪
          failureThreshold: 3         # 连续失败3次认为不就绪
        
        # 健康检查：存活探针
        # 用于判断容器是否存活，不存活会重启容器
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30     # 容器启动后等待30秒开始检查
          periodSeconds: 20            # 每20秒检查一次
          timeoutSeconds: 5
          failureThreshold: 3
        
        # 环境变量配置
        env:
        - name: NGINX_HOST
          value: "localhost"
        - name: NGINX_PORT
          value: "80"
        
        # 生命周期钩子
        lifecycle:
          # 容器启动后执行的钩子
          postStart:
            exec:
              command: ["/bin/sh", "-c", "echo 'Nginx started' > /tmp/start.log"]
          
          # 容器停止前执行的钩子
          preStop:
            exec:
              command: ["/bin/sh", "-c", "echo 'Nginx stopping' > /tmp/stop.log"]
      
      # 重启策略
      # - Always: 容器退出时总是重启（默认）
      # - OnFailure: 只在容器异常退出时重启
      # - Never: 从不重启
      restartPolicy: Always
      
      # DNS策略
      dnsPolicy: ClusterFirst
      
      # 节点选择器：指定Pod运行在哪些节点上
      # nodeSelector:
      #   disktype: ssd  # 只在有ssd标签的节点上运行

# =============================================================================
# 常用操作命令（使用此配置文件的示例）
# =============================================================================
# 
# 1. 创建Deployment：
#    kubectl apply -f nginx-deployment-详细注释.yaml
#
# 2. 查看Deployment状态：
#    kubectl get deployment nginx-deploy
#
# 3. 查看Pod状态：
#    kubectl get pods -l app=nginx
#
# 4. 查看Pod详细信息：
#    kubectl describe pod <pod-name>
#
# 5. 查看Pod日志：
#    kubectl logs <pod-name>
#
# 6. 进入Pod容器：
#    kubectl exec -it <pod-name> -- /bin/bash
#
# 7. 扩容到5个副本：
#    kubectl scale deployment nginx-deploy --replicas=5
#
# 8. 更新镜像版本：
#    kubectl set image deployment nginx-deploy nginx=nginx:1.24
#
# 9. 回滚到上一个版本：
#    kubectl rollout undo deployment nginx-deploy
#
# 10. 删除Deployment：
#     kubectl delete -f nginx-deployment-详细注释.yaml
#
# =============================================================================